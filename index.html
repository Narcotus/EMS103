<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#8B1A1A">
<meta name="description" content="EMS 103 — справочное приложение для бригад скорой медицинской помощи г. Минска">
<title>EMS 103 · Минск</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/favicon-32x32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<link rel="stylesheet" href="css/md3-theme.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/calculator.css">
</head>
<body>
<!-- Top App Bar -->
<header id="top-bar"></header>
<!-- Navigation Drawer -->
<nav id="nav-drawer" class="nav-drawer"></nav>
<!-- Scrim (затемнение) -->
<div id="scrim" class="scrim"></div>
<!-- Main Content -->
<main id="app-content" class="app-content"></main>
<!-- Bottom Navigation -->
<nav id="bottom-nav" class="bottom-nav"></nav>
<!-- Snackbar -->
<div id="snackbar" class="snackbar"></div>
<noscript>
<div style="padding: 40px; text-align: center;">
<h2>⚠️ JavaScript отключён</h2>
<p>Для работы EMS 103 включите JavaScript.</p>
</div>
</noscript>
<script type="module" src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('sw.js')
.then(reg => console.log('✅ SW registered'))
.catch(err => console.log('❌ SW failed:', err));
});
}
</script>
</body>
</html>
