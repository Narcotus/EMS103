    <!-- =============================================
         КРИТИЧНО: Скрипт инициализации темы ДО загрузки CSS
         Предотвращает мигание и неправильный фон
         ============================================= -->
    <script>
        (function() {
            try {
                const mode = localStorage.getItem('ems103-theme-mode') || 'auto';
                let theme = 'light';
                
                if (mode === 'dark') {
                    theme = 'dark';
                } else if (mode === 'light') {
                    theme = 'light';
                } else if (mode === 'time') {
                    const hour = new Date().getHours();
                    theme = (hour >= 19 || hour < 6) ? 'dark' : 'light';
                } else {
                    // auto - следует за системой
                    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                
                // Устанавливаем ЯВНО (light или dark) — не auto!
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme;
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    
    <!-- =============================================
         Inline стили загрузочного экрана
         БЕЗ @media queries — тема управляется через data-theme
         ============================================= -->
    <style>
